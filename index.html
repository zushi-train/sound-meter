<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>音量メーター</title>
<style>
  body {
    font-family: sans-serif;
    text-align: center;
    background: #111;
    color: #fff;
  }
  h1 {
    margin-top: 20px;
  }
  #meter {
    width: 80%;
    height: 30px;
    background: #333;
    margin: 30px auto;
    border-radius: 20px;
    overflow: hidden;
  }
  #bar {
    height: 100%;
    width: 0%;
    background: lime;
    transition: width 0.1s;
  }
  #db {
    font-size: 2em;
  }
  button {
    padding: 10px 20px;
    font-size: 1em;
    border-radius: 10px;
    border: none;
    background: #0af;
    color: white;
  }
</style>
</head>
<body>

<h1>🎤 音量メーター</h1>
<button onclick="start()">スタート</button>

<div id="meter">
  <div id="bar"></div>
</div>

<div id="db">0 dB</div>

<script>
let audioContext, analyser, microphone;

async function start() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  audioContext = new AudioContext();
  analyser = audioContext.createAnalyser();
  microphone = audioContext.createMediaStreamSource(stream);

  microphone.connect(analyser);
  analyser.fftSize = 256;

  const dataArray = new Uint8Array(analyser.frequencyBinCount);

  function update() {
    analyser.getByteTimeDomainData(dataArray);

    let sum = 0;
    for (let i = 0; i < dataArray.length; i++) {
      let val = (dataArray[i] - 128) / 128;
      sum += val * val;
    }

    let volume = Math.sqrt(sum / dataArray.length);
    let db = Math.round(20 * Math.log10(volume + 0.0001) + 100);

    document.getElementById("db").innerText = db + " dB";
    document.getElementById("bar").style.width = db + "%";

    requestAnimationFrame(update);
  }

  update();
}
</script>

</body>
</html>
