<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>うるさい！チャレンジ</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #111;
  color: #fff;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  min-height: 100vh;
}

h1 {
  font-size: 6vw;
}

#meter {
  width: 90%;
  height: 8vh;
  background: #333;
  border-radius: 30px;
  overflow: hidden;
  position: relative;
  margin: 20px 0;
}

#meter::after {
  content: "";
  position: absolute;
  right: 0;
  width: 25%;
  height: 100%;
  background: rgba(255,0,0,0.3);
}

#bar {
  height: 100%;
  width: 0%;
  background: lime;
}

#db {
  font-size: 10vw;
  font-weight: bold;
}

/* 🔴 点滅 */
.blink {
  animation: blink 1s infinite;
}

@keyframes blink {
  0% { opacity: 1; }
  50% { opacity: 0.2; }
  100% { opacity: 1; }
}

#comment {
  font-size: 5vw;
  margin-top: 10px;
}

button {
  font-size: 6vw;
  padding: 20px 40px;
  border-radius: 20px;
  border: none;
  background: #0af;
  color: white;
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>🎤 うるさい！チャレンジ</h1>

<div id="meter">
  <div id="bar"></div>
</div>

<div id="db" style="font-size:6vw;">▶ スタートをおしてね</div>
<div id="comment"></div>

<button onclick="start()">スタート</button>

<script>
let audioContext, analyser, microphone;
let isSilent = true;

async function start() {
  document.getElementById("bar").style.width = "0%";
  document.getElementById("comment").innerText = "";

  // 🔴 点滅付き表示
  document.getElementById("db").innerHTML =
    "<span class='blink'>🔴</span> 計測中";

  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  audioContext = new AudioContext();
  analyser = audioContext.createAnalyser();
  microphone = audioContext.createMediaStreamSource(stream);

  microphone.connect(analyser);
  analyser.fftSize = 256;

  const dataArray = new Uint8Array(analyser.frequencyBinCount);

  let maxDb = 0;
  let startTime = Date.now();

  function measure() {
    analyser.getByteTimeDomainData(dataArray);

    let sum = 0;
    for (let i = 0; i < dataArray.length; i++) {
      let val = (dataArray[i] - 128) / 128;
      sum += val * val;
    }

    let volume = Math.sqrt(sum / dataArray.length);

    if (isSilent) {
      if (volume > 0.03) isSilent = false;
    } else {
      if (volume < 0.015) isSilent = true;
    }

    if (isSilent) volume = 0;

    let offset = 55;
    let db = volume === 0 ? 0 : Math.round(20 * Math.log10(volume) + offset);
    db = Math.min(db, 150);

    if (db > maxDb) maxDb = db;

    let elapsed = (Date.now() - startTime) / 1000;

    if (elapsed < 5) {
      requestAnimationFrame(measure);
    } else {
      showResult(maxDb);
    }
  }

  measure();
}

// 結果
function showResult(resultDb) {
  let bar = document.getElementById("bar");
  let dbText = document.getElementById("db");
  let comment = document.getElementById("comment");

  let current = 0;

  function animate() {
    current += 1;

    let percent = (current / 150) * 100;
    bar.style.width = percent + "%";

    dbText.style.fontSize = "10vw";
    dbText.innerText = current + " dB";

    if (current < resultDb) {
      requestAnimationFrame(animate);
    } else {
      dbText.innerText = resultDb + " dB 🎉";
      comment.innerText = getComment(resultDb);
    }
  }

  animate();
}

function getComment(db) {
  if (db < 30) return "しずか";
  if (db < 50) return "ちょっと　うるさい";
  if (db < 70) return "ふつうに　うるさい";
  if (db < 90) return "かなり　うるさい！";
  if (db < 120) return "すごく　うるさい！！";
  return "ちょ～　うるさ～～い！！！";
}
</script>

</body>
</html>
